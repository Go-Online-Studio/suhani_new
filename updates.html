<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Latest updates, trends, and news from Suhani Industries. Explore our blog on CNC machining, wood carving designs, and manufacturing insights.">
    <title>Updates & Insights | Suhani Industries</title>
    <link rel="icon" href="images/Fevicon.png" type="image/png" fetchpriority="low">

    <link rel="preload" as="image" href="images/BrandLogo.webp" fetchpriority="high">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" as="style" href="css/style.css" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" as="style" href="css/responsive.css" onload="this.onload=null;this.rel='stylesheet'">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

</head>

<body>

    <!-- ========== NAVIGATION ========== -->
    <nav class="navbar navbar-expand-lg fixed-top" id="mainNavbar">
    </nav>

    <!-- Mobile Offcanvas Menu -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="mobileMenu">
    </div>

    <!-- ========== PAGE HERO SECTION ========== -->
    <section class="about-hero section_padding heroPadding">
        <div class="hero-bg"
            style="background-image: url('https://images.unsplash.com/photo-1614014246201-14644e9b9c06?w=1920&q=80');">
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-geometric-accent"></div>
        <div class="crosshair-overlay"></div>

        <div class="container">
            <div class="about-hero-content" data-aos="fade-up">
                <div class="hero-tag-wrapper">
                    <span class="hero-tag">
                        <span class="tag-line"></span>
                        NEWS & INSIGHTS
                    </span>
                </div>
                <h1 class="page-title glitch-text">
                    THE LATEST <span class="neon-text-white">UPDATES</span>
                </h1>
                <p class="page-subtitle">
                    Stay informed with the latest trends in CNC manufacturing, design inspirations, and company
                    announcements.
                </p>
            </div>
        </div>

        <div class="scroll-indicator">
            <span class="scroll-text">SCROLL</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- ========== BLOG SEARCH & FILTER SECTION ========== -->
    <section class="blog-filter-section section_padding">
        <div class="circuit-pattern"></div>
        <div class="container">
            <!-- Search & Categories Row -->
            <div class="row mb-5 align-items-center g-4">
                <div class="col-lg-6" data-aos="fade-right">
                    <div class="blog-search-wrapper">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" id="blogSearch" class="blog-search-input" placeholder="Search articles...">
                        <div class="search-border"></div>
                    </div>
                </div>
                <div class="col-lg-6" data-aos="fade-left">
                    <div class="blog-categories" id="categoryContainer">
                        <button class="blog-filter-btn active" data-category="all">
                            All
                        </button>
                        <!-- Categories will be injected here dynamically -->
                        <button class="blog-filter-btn" data-category="Machinery Updates">Machinery</button>
                        <button class="blog-filter-btn" data-category="New Designs">Design</button>
                        <button class="blog-filter-btn" data-category="Metal Work">Metal Work</button>
                    </div>
                </div>
            </div>

            <!-- Blog Grid -->
            <div class="row g-4" id="blogGrid">
                <!-- Blog Cards will be injected here via JS -->
                <div class="col-12 text-center text-white p-5">Loading Updates...</div>
            </div>
        </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer class="footer-section" id="footer">
    </footer>

    <!-- Back to Top Button -->
    <a href="#" class="back-to-top" id="backToTop">
        <i class="bi bi-chevron-up"></i>
        <span class="progress-ring"></span>
    </a>

    <!-- Scripts -->
    <!-- Critical JS - Load First -->
    <script src="js/critical.js"></script>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- Common Utilities -->
    <script src="js/script.js"></script>

    <!-- Page-Specific JS -->
    <script src="js/updates.js"></script>
</body>

</html>
